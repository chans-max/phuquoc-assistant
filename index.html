    --accent: #0e7490; --accent-soft: #e0f2f7; --line: #e3eaef;
    --good: #15803d; --warn: #b45309; --now: #0e7490; --done: #9fb2bf;
    --chip: #eef4f7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1419; --card: #16212a; --ink: #e8eef2; --sub: #8da3b3;
      --accent: #38bdf8; --accent-soft: #11303d; --line: #243441;
      --good: #4ade80; --warn: #fbbf24; --now: #38bdf8; --done: #4d6373;
      --chip: #1d2c37;
    }

  }
  header { display: flex; align-items: baseline; justify-content: space-between; margin: 4px 2px 14px; }
  header h1 { font-size: 19px; font-weight: 800; letter-spacing: -0.3px; }
  header .clock { font-size: 12px; color: var(--sub); font-variant-numeric: tabular-nums; text-align: right; }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 16px; margin-bottom: 12px; }

  /* hero */
  #hero .label { font-size: 12px; font-weight: 700; color: var(--now); margin-bottom: 6px; letter-spacing: 0.5px; }
  #hero .title { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; margin-bottom: 4px; }
  #hero .meta { font-size: 13.5px; color: var(--sub); white-space: pre-line; }
  #hero .count { display: inline-block; margin-top: 10px; background: var(--accent-soft); color: var(--accent);
    font-size: 13px; font-weight: 700; padding: 5px 12px; border-radius: 999px; font-variant-numeric: tabular-nums; }
  #hero .tips { margin-top: 10px; font-size: 13px; color: var(--sub); }

  /* tabs */
  nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 560px;
    display: flex; background: var(--card); border-top: 1px solid var(--line);
    padding: 6px 8px calc(8px + env(safe-area-inset-bottom)); z-index: 10; }
  nav button { flex: 1; background: none; border: none; color: var(--sub); font-size: 11.5px; font-weight: 600;
    padding: 7px 0 5px; cursor: pointer; border-radius: 10px; font-family: inherit; }
  nav button .ico { display: block; font-size: 19px; margin-bottom: 2px; }
  nav button.on { color: var(--accent); background: var(--accent-soft); }

  section { display: none; } section.on { display: block; }

  /* chat */
  #chatlog { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
  .msg { max-width: 88%; padding: 10px 14px; border-radius: 16px; font-size: 14.5px; }
  .msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .msg.bot { align-self: flex-start; background: var(--card); border: 1px solid var(--line); border-bottom-left-radius: 4px; }
  .msg.bot b { color: var(--accent); }
  .msg.bot ul { padding-left: 18px; margin: 4px 0; }
  .msg.bot .small { font-size: 12.5px; color: var(--sub); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .chips button { background: var(--chip); color: var(--ink); border: 1px solid var(--line); border-radius: 999px;
    font-size: 12.5px; font-weight: 600; padding: 7px 12px; cursor: pointer; font-family: inherit; }
  #askbar { display: flex; gap: 8px; }
  #askbar input { flex: 1; background: var(--card); border: 1.5px solid var(--line); border-radius: 12px;
    padding: 12px 14px; font-size: 15px; color: var(--ink); font-family: inherit; outline: none; }
  #askbar input:focus { border-color: var(--accent); }
  #askbar button { background: var(--accent); color: #fff; border: none; border-radius: 12px;
    padding: 0 18px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }

  /* timeline */
  .subtabs { display: flex; gap: 6px; margin: 2px 0 4px; }
  .subtabs button { flex: 1; background: var(--card); border: 1.5px solid var(--line); border-radius: 12px;
    padding: 10px 0; font-size: 13.5px; font-weight: 700; color: var(--sub); cursor: pointer; font-family: inherit; }
  .subtabs button.on { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .dayhead { font-size: 14px; font-weight: 800; margin: 18px 2px 8px; display: flex; justify-content: space-between; align-items: baseline; }
  .dayhead .tz { font-size: 11px; font-weight: 600; color: var(--sub); }
  .evt { display: flex; gap: 12px; background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 12px 14px; margin-bottom: 8px; }
  .evt .t { min-width: 78px; font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--sub); padding-top: 1px; }
  .evt .body .n { font-size: 14.5px; font-weight: 700; letter-spacing: -0.2px; }
  .evt .body .d { font-size: 12.5px; color: var(--sub); margin-top: 2px; }
  .evt .body .log { font-size: 12.5px; color: var(--accent); margin-top: 5px; background: var(--accent-soft);
    border-radius: 9px; padding: 7px 10px; line-height: 1.45; }
  .evt.now { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .evt.now .t { color: var(--accent); }
  .evt.done { opacity: 1; }
  .badge { font-size: 10.5px; font-weight: 800; color: #fff; background: var(--accent); border-radius: 6px; padding: 1px 7px; margin-left: 6px; vertical-align: 2px; }

  /* staff */

    border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; margin-bottom: 6px; }

  .person .rl { font-size: 12px; color: var(--sub); margin-left: 6px; font-weight: 600; }
  .person a { color: var(--accent); font-size: 13.5px; font-weight: 700; text-decoration: none; }

  .info-row .v { font-weight: 700; text-align: right; }
  .src { font-size: 12px; color: var(--sub); text-align: center; margin-top: 14px; }
  .src a { color: var(--accent); }

  /* pull-to-refresh */
  #ptr-indicator {

  #ptr-indicator.pulling { height: 48px; }
  #ptr-indicator.refreshing { height: 48px; }
  #ptr-indicator .ptr-spin { display: inline-block; }
  #ptr-indicator.refreshing .ptr-spin { animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* budget */
  .bsums { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .bsum { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 14px; }
  .bsum .lbl { font-size: 12px; color: var(--sub); font-weight: 600; margin-bottom: 4px; }
  .bsum .val { font-size: 17px; font-weight: 800; letter-spacing: -0.3px; }
  .bsum .val2 { font-size: 13px; color: var(--sub); margin-top: 2px; }
  .bsum.total .val { color: var(--accent); }
  .bsum.remain .val { color: var(--good); }
  .bsum.spent .val { color: var(--warn); }
  .bitem { display: flex; justify-content: space-between; align-items: center; background: var(--card);

  .bitem .bn { font-size: 14px; font-weight: 700; }
  .bitem .ba { font-size: 14px; font-weight: 700; }
  .bitem .ba.out { color: var(--warn); }
  .bitem .ba.in { color: var(--good); }
  .bsec { font-size: 13px; font-weight: 800; color: var(--sub); margin: 14px 2px 8px; }

  /* swipe-to-edit */
  .evt-wrap { position: relative; margin-bottom: 8px; }
  .evt-wrap .evt { margin-bottom: 0; position: relative; z-index: 1;
    transition: transform 0.22s cubic-bezier(.4,0,.2,1); will-change: transform; }
  .evt-wrap.swiped .evt { transform: translateX(-80px); }
  .evt-wrap.done .evt { opacity: 0.5; }
  .evt-wrap.done .swipe-edit { display: none; }
  .swipe-edit { position: absolute; right: 0; top: 0; bottom: 0; width: 80px;
    display: flex; align-items: center; justify-content: center; }
  .swipe-edit a { background: var(--accent); color: #fff; font-size: 13.5px; font-weight: 700;
    text-decoration: none; padding: 10px 16px; border-radius: 10px; }
</style>
</head>

const TZOFF = { KR: 9 * 60, VN: 7 * 60 }; // 분 단위 UTC 오프셋 (둘 다 DST 없음)
function toEpoch(dateStr, timeStr, tz) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const [hh, mm] = timeStr.split(':').map(Number);
  return Date.UTC(y, m - 1, d, hh, mm) - TZOFF[tz] * 60000;
}

// 각 일정의 시작/종료 epoch 계산. 종료 미지정 시 같은 날 다음 일정 시작 or +2.5h
function prepEvents(list, nids) {
  list.forEach((e, i) => {
    if (nids) e.nid = nids[i];
    e.s = toEpoch(e.date, e.start, e.tz);
    if (e.end) e.e = toEpoch(e.date, e.end, e.endTz || e.tz);
    else {
      const nxt = list[i + 1];
      e.e = (nxt && nxt.date === e.date) ? toEpoch(nxt.date, nxt.start, nxt.tz) : e.s + 150 * 60000;
    }
  });
}

const DAYNAMES = ['일','월','화','수','목','금','토'];
function fmtDay(dateStr) {
  const [y,m,d] = dateStr.split('-').map(Number);
  return `${m}월 ${d}일 (${DAYNAMES[new Date(Date.UTC(y,m-1,d)).getUTCDay()]})`;
}
function fmtDur(ms) {
  const min = Math.max(0, Math.round(ms / 60000));
  const d = Math.floor(min / 1440), h = Math.floor((min % 1440) / 60), m = min % 60;
  let s = '';
  if (d) s += d + '일 ';
  if (h) s += h + '시간 ';
  if (m || !s) s += m + '분';
  return s.trim();
}

function nowState() {
  const now = Date.now();
  let current = null, next = null, prev = null;
  for (const e of curEvents()) {
    if (now >= e.s && now < e.e) current = e;
    if (e.e <= now) prev = e;
    if (!next && e.s > now) next = e;
  }
  return { now, current, next, prev };
}
function evtTimeLabel(e) {
  return e.start + (e.end ? '–' + e.end : '') + (e.tz === 'KR' ? ' KST' : '');
}

// ───────────────────────── 스와이프 수정 ─────────────────────────
function bindSwipe() {
  const tl = document.getElementById('timeline');
  let startX = 0, startY = 0, target = null, dirLocked = false, isHoriz = false;

  tl.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    target = e.target.closest('.evt-wrap');
    dirLocked = false; isHoriz = false;
  }, { passive: true });

  tl.addEventListener('touchmove', e => {
    if (!target) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (!dirLocked) {
      if (Math.abs(dx) < 6 && Math.abs(dy) < 6) return;
      dirLocked = true;
      isHoriz = Math.abs(dx) > Math.abs(dy);
    }
    if (isHoriz) e.preventDefault();
  }, { passive: false });

  tl.addEventListener('touchend', e => {
    if (!target || !dirLocked || !isHoriz) { target = null; return; }
    const dx = e.changedTouches[0].clientX - startX;
    if (dx < -44) {
      // 다른 열린 것 닫기
      tl.querySelectorAll('.evt-wrap.swiped').forEach(w => { if (w !== target) w.classList.remove('swiped'); });
      target.classList.add('swiped');
    } else if (dx > 20) {
      target.classList.remove('swiped');
    }
    target = null;
  }, { passive: true });

  // 타임라인 바깥 터치 시 닫기
  document.addEventListener('touchstart', e => {
    if (!e.target.closest('#timeline')) {
      tl.querySelectorAll('.evt-wrap.swiped').forEach(w => w.classList.remove('swiped'));
    }
  }, { passive: true });
}

      ${spentUSD > 0 ? `<div class="val2">$${fmt(spentUSD)}</div>` : ''}
    </div>
    <div class="bsum remain" style="grid-column:span 2">
      <div class="lbl">✅ 남은 금액</div>
      <div class="val">${fmt(remVND)}동${remUSD > 0 ? ` + $${fmt(remUSD)}` : ''}</div>
    </div>
  </div>`;

  h += `<div class="bsec">지출내역 (${expenses.length}건)</div>`;
  if (expenses.length) {
    h += expenses.map(item => {
      const amt = [item.vnd ? `-${fmt(item.vnd)}동` : '', item.usd ? `-$${fmt(item.usd)}` : ''].filter(Boolean).join(' / ');
      return `<div class="bitem"><span class="bn">${item.name}</span><span class="ba out">${amt}</span></div>`;
    }).join('');
  } else {
    h += `<div class="bitem"><span class="bn" style="color:var(--sub)">아직 지출내역이 없어요</span></div>`;
  }

  if (income.length) {
    h += `<div class="bsec">수입내역 (${income.length}건)</div>`;
    h += income.map(item => {
      const amt = [item.vnd ? `+${fmt(item.vnd)}동` : '', item.usd ? `+$${fmt(item.usd)}` : ''].filter(Boolean).join(' / ');
      return `<div class="bitem"><span class="bn">${item.name}</span><span class="ba in">${amt}</span></div>`;
    }).join('');
  }

  h += `<p class="src">데이터 출처: <a href="https://app.notion.com/p/37c9e8ba205180b9b685c068db8f7464" target="_blank">경비 DB ↗</a><br>Notion에 지출 추가 후 동기화하면 반영돼요</p>`;
  document.getElementById('budget').innerHTML = h;
}

// ───────────────────────── 비서 Q&A ─────────────────────────
const QUICKS = ['지금 뭐 해야 해?', '다음 일정은?', '오늘 일정', '김란 감독 일정', '어디로 가야 해?', '촬영일지', '담당자 연락처', '경비 얼마?', '비행기 정보'];

function evtLine(e, withDay) {
  return `<b>${withDay ? fmtDay(e.date) + ' ' : ''}${evtTimeLabel(e)}</b> ${e.title}${e.loc ? `<br><span class="small">📍 ${e.loc}</span>` : ''}${e.desc ? `<br><span class="small">${e.desc}</span>` : ''}${e.log ? `<br><span class="small">📝 ${e.log}</span>` : ''}`;
}
function tipsLine(e) { return e.tips.length ? `<br><span class="small">💡 ${e.tips.join(' · ')}</span>` : ''; }

function dayEvents(dateStr, list = curEvents()) { return list.filter(e => e.date === dateStr); }
function listDay(dateStr, label) {
  const evs = dayEvents(dateStr);
  if (!evs.length) return `${label}에는 등록된 일정이 없어요.`;
  const { now } = nowState();
  return `<b>${label} 일정</b> (${evs.length}건)<ul>` + evs.map(e => {
    const st = now >= e.e ? '✓ ' : (now >= e.s ? '▶ ' : '');
    return `<li>${st}<b>${evtTimeLabel(e)}</b> ${e.title}</li>`;
  }).join('') + '</ul>';
}

function answer(qRaw) {
  const q = qRaw.toLowerCase().replace(/\s+/g, '');
  const { now, current, next } = nowState();

  // 김란 감독(RANI) 일정
  if (/김란|라니|rani/i.test(qRaw)) {
    const rNow = EVENTS_RANI.find(e => now >= e.s && now < e.e);
    const rNext = EVENTS_RANI.find(e => e.s > now);
    let r = `🎬 <b>김란 감독 (RANI)</b> — 행사장·공연 담당<br>`;
    if (rNow) r += `▶ 지금: ${evtLine(rNow)}<br>`;
    if (rNext) r += `⏭ 다음: ${evtLine(rNext, true)}<br>`;
    if (!rNow && !rNext) r += `남은 일정이 없어요.<br>`;
    return r + `<span class="small">전체 일정은 [일정] 탭 → RANI에서 확인하세요.</span>`;
  }

  // 스탭 이름 직접 검색
  const person = STAFF.find(p => q.includes(p.name));
  if (person) {
    return `<b>${person.name} ${person.role}</b>${person.note ? ` — ${person.note}` : ''}${person.tel ? `<br>📞 <a href="tel:${person.tel}">${person.tel}</a>` : '<br><span class="small">연락처는 등록돼 있지 않아요. 소통 담당 최재주 책임(010-8911-0424)을 통해 확인하세요.</span>'}`;
  }

  // 연락처/담당자
  if (/연락처|전화|담당|콜|연락/.test(q)) {
    return `소통 담당자는 <b>최재주 책임</b>이에요.<br>📞 <a href="tel:010-8911-0424">010-8911-0424</a><br><span class="small">전체 스탭 명단은 [스탭·정보] 탭에서 확인하세요. (총 16명)</span>`;
  }

  // 경비/돈
  if (/경비|돈|환전|얼마|달러|동$|비용/.test(q)) {
    const fmt = n => n.toLocaleString('ko-KR');
    const spentVND = BUDGET.items.filter(x => x.type === '지출').reduce((s, x) => s + (x.vnd || 0), 0);
    const spentUSD = BUDGET.items.filter(x => x.type === '지출').reduce((s, x) => s + (x.usd || 0), 0);
    const remVND = BUDGET.totalVND - spentVND;
    const remUSD = BUDGET.totalUSD - spentUSD;
    return `💰 <b>경비 현황</b><br>총 경비: <b>${fmt(BUDGET.totalVND)}동 + $${fmt(BUDGET.totalUSD)}</b><br>지출: <b>${fmt(spentVND)}동${spentUSD > 0 ? ` + $${fmt(spentUSD)}` : ''}</b><br>남은 금액: <b>${fmt(remVND)}동${remUSD > 0 ? ` + $${fmt(remUSD)}` : ''}</b><br><span class="small">자세한 내역은 [💰경비] 탭에서 확인하세요.</span>`;
  }

  // 비행기/항공
  if (/비행|항공|편명|탑승|출국|귀국|복귀/.test(q)) {
    if (planWho === 'RANI') {
      return `✈️ <b>항공 일정 · 🎬 RANI (김란)</b><ul>
        <li><b>출국</b> 6/10(수) 대한항공 KE485 (인천→푸꾸옥) — 인천 T2 19:05(KST) → 푸꾸옥 22:50(현지)</li>
        <li><b>귀국</b> 6/13(토) 19:00 선발대 공항 이동(스탭밴1) — ⚠ 귀국 항공편 확인 필요</li></ul>
        <span class="small">출국 집결: 6/10 13:00, 인천 T2 3층 E카운터(5번 게이트) 앞</span>`;
    }
    return `✈️ <b>항공 일정 · 📸 Chans (강주찬)</b><ul>
      <li><b>출국</b> 6/10(수) 제주항공 7C2315 — 인천 17:20(KST) → 푸꾸옥 21:25(현지)</li>
      <li><b>귀국</b> 6/13(토) 푸꾸옥 22:25(현지) 출발 → 6/14(일) 06:05 인천 입국수속</li></ul>
      <span class="small">출국 집결: 6/10 13:00, 인천 T1 3층 L카운터(12번 게이트) 앞 · 귀국 공항이동: 6/13 20:00, 5–9호차 (염초희 대리·박지운 책임 동행)</span>`;
  }

  // 촬영일지
  if (/촬영일지|일지|후기|뭐찍|뭘찍|찍었|기록/.test(q)) {
    const logged = curEvents().filter(e => e.log);
    if (!logged.length) return `${whoLabel()} 기준으로 아직 작성된 촬영일지가 없어요. 촬영 후 Notion에 기록하면 여기에 반영돼요.`;
    return `📝 <b>촬영일지 · ${whoLabel()}</b> (${logged.length}건)<ul>` +
      logged.map(e => `<li>${evtLine(e, true)}</li>`).join('') + '</ul>';
  }

  // 어디
  if (/어디|장소|위치|가야/.test(q)) {
    if (current) return `지금은 <b>${current.title}</b> 시간이에요.<br>📍 <b>${current.loc || '장소 정보 없음'}</b>${next ? `<br><span class="small">다음 장소: ${next.loc || next.title} (${next.start})</span>` : ''}`;
    if (next) return `다음으로 갈 곳은 📍 <b>${next.loc || next.title}</b><br>${evtLine(next, true)}${tipsLine(next)}`;
    return '남은 일정이 없어요.';
  }

  // 특정 날짜
  const dm = qRaw.match(/(\d{1,2})일/);
  if (dm) {
    const d = String(dm[1]).padStart(2, '0');
    return listDay(`2026-06-${d}`, `6월 ${dm[1]}일`);
  }
  if (/오늘/.test(q)) {
    const today = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Ho_Chi_Minh' }).format(new Date());
    return listDay(today, '오늘');
  }
  if (/내일/.test(q)) {
    const t = new Date(Date.now() + 86400000);
    const tomorrow = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Ho_Chi_Minh' }).format(t);
    return listDay(tomorrow, '내일');
  }
  if (/전체|모든일정|풀스케줄/.test(q)) {
    return [...new Set(curEvents().map(e => e.date))].map(d => listDay(d, fmtDay(d))).join('<br>');
  }

  // 다음 일정
  if (/다음|이따|이후|그다음/.test(q)) {
    if (!next) return '남은 일정이 없어요. 수고하셨습니다! 🎉';
    return `다음 일정이에요.<br>${evtLine(next, true)}<br><span class="small">⏳ ${fmtDur(next.s - now)} 남음</span>${tipsLine(next)}`;
  }

  // 지금 뭐해 (기본)
  if (/지금|뭐해|뭐하|할일|해야|현재|이제/.test(q)) {
    let r = '';
    if (current) {
      r = `지금은 <b>${current.title}</b> 시간이에요.<br>${evtLine(current)}${tipsLine(current)}`;
      if (next) r += `<br><span class="small">⏭ 다음: ${next.start} ${next.title} (${fmtDur(next.s - now)} 후)</span>`;
    } else if (next) {
      r = `지금은 비는 시간이에요. 다음 일정을 준비하세요.<br>${evtLine(next, true)}<br><span class="small">⏳ ${fmtDur(next.s - now)} 남음</span>${tipsLine(next)}`;
    } else r = '모든 일정이 끝났어요! 🎉';
    return r;
  }

  // 일정 키워드 검색 (토큰 단위, 조사 제거)
  const STOP = ['언제', '어디', '일정', '시간', '몇시', '며칠', '정보', '알려줘', '알려', '해야', '가야', '하나요', '인가요'];
  const tokens = qRaw.replace(/[?!.,~]/g, ' ').split(/\s+/)
    .map(w => w.replace(/(은|는|이|가|을|를|의|에서|에는|으로|로|에)$/, ''))
    .filter(w => w.length >= 2 && !STOP.includes(w));
  if (tokens.length) {
    const hits = curEvents().filter(e => tokens.some(t => (e.title + (e.desc || '') + (e.loc || '') + (e.log || '')).includes(t)));
    if (hits.length) return `"<b>${tokens.join(', ')}</b>" 관련 일정이에요.<ul>` + hits.map(e => `<li>${evtLine(e, true)}${tipsLine(e)}</li>`).join('') + '</ul>';
  }

  // 폴백
  return `잘 모르겠어요 😅 이렇게 물어보세요:<br><span class="small">"지금 뭐 해?" · "다음 일정은?" · "12일 일정" · "촬영일지" · "혼똔섬 언제?" · "최재주 연락처"</span>` +
    (next ? `<br><br>참고로 다음 일정은:<br>${evtLine(next, true)}` : '');
}

function addMsg(html, who) {
  const log = document.getElementById('chatlog');
  const div = document.createElement('div');
  div.className = 'msg ' + who;
  div.innerHTML = html;
  log.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}
function ask(text) {
  const input = document.getElementById('q');
  const t = (text || input.value).trim();
  if (!t) return;
  input.value = '';
  addMsg(t.replace(/</g, '&lt;'), 'user');
  setTimeout(() => addMsg(answer(t), 'bot'), 150);
}
document.getElementById('q').addEventListener('keydown', e => { if (e.key === 'Enter') ask(); });
document.getElementById('chips').innerHTML = QUICKS.map(q => `<button onclick="ask('${q}')">${q}</button>`).join('');

// ───────────────────────── 탭 ─────────────────────────
document.querySelectorAll('#whotabs button').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('#whotabs button').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  const changed = planWho !== b.dataset.who;
  planWho = b.dataset.who;
  renderHero(); renderTimeline();
  if (changed) addMsg(`🔄 이제 <b>${whoLabel()}</b> 일정 기준으로 안내해요.`, 'bot');
}));
document.querySelectorAll('nav button').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('nav button').forEach(x => x.classList.remove('on'));
  document.querySelectorAll('section').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  document.getElementById('tab-' + b.dataset.tab).classList.add('on');
}));

// ───────────────────────── 초기화 ─────────────────────────
renderHero(); renderClock(); renderTimeline(); renderStaff(); renderBudget(); bindSwipe();
setInterval(() => { renderHero(); renderClock(); renderTimeline(); }, 10000);

// 모바일 백그라운드 후 복귀 시 즉시 갱신 (iOS PWA / 안드로이드 크롬 throttle 대응)
function refreshAll() { renderHero(); renderClock(); renderTimeline(); }
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') refreshAll(); });
window.addEventListener('pageshow', e => { if (e.persisted) refreshAll(); }); // iOS bfcache 대응

// ── Pull-to-refresh ──
(function() {
  const THRESHOLD = 72; // 당겨야 하는 최소 픽셀
  const ptr = document.getElementById('ptr-indicator');
  const ptrText = document.getElementById('ptr-text');
  let startY = 0, pulling = false, isRefreshing = false;

  document.addEventListener('touchstart', e => {
    if (isRefreshing) return;
    if (window.scrollY === 0) {
      startY = e.touches[0].clientY;
      pulling = true;
    }
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!pulling || isRefreshing) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 0 && window.scrollY === 0) {
      ptr.classList.add('pulling');
      ptrText.textContent = dy >= THRESHOLD ? '놓아서 새로고침' : '당겨서 새로고침';
    } else {
      ptr.classList.remove('pulling');
    }
  }, { passive: true });

  document.addEventListener('touchend', e => {
    if (!pulling || isRefreshing) return;
    pulling = false;
    const dy = e.changedTouches[0].clientY - startY;
    if (dy >= THRESHOLD && window.scrollY === 0) {
      isRefreshing = true;
      ptr.classList.add('refreshing');
      ptr.classList.remove('pulling');
      ptrText.textContent = '새로고침 중…';
      setTimeout(() => {
        refreshAll();
        ptr.classList.remove('refreshing');
        ptrText.textContent = '당겨서 새로고침';
        isRefreshing = false;
      }, 600);
    } else {
      ptr.classList.remove('pulling');
    }
  }, { passive: true });
})();
addMsg('안녕하세요! 푸꾸옥 촬영 일정 비서예요. 🌴<br>지금 뭘 해야 하는지, 어디로 가야 하는지, 다음 일정이 뭔지 물어보세요.', 'bot');
</script>
